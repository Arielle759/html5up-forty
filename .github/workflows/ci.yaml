name: CI-CD Docker Pipeline

on:
  push:
    branches:
      - main
      - trivy

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ci-html:1.0.1
          outputs: type=docker,dest=/tmp/image.tar

      - name: Save image as artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar

  scan-trivy:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load --input /tmp/image.tar

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ci-html:1.0.1
          format: sarif
          output: trivy-results.sarif
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Upload results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  deploy:
    name: Deploy to Docker Hub
    runs-on: ubuntu-latest
    needs: [build, scan-trivy]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load --input /tmp/image.tar

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image to Docker Hub
        run: |
          docker tag ci-html:1.0.1 ${{ secrets.DOCKERHUB_USERNAME }}/ci-html:1.0.1
          docker tag ci-html:1.0.1 ${{ secrets.DOCKERHUB_USERNAME }}/ci-html:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ci-html:1.0.1
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ci-html:latest
